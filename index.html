<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeBite</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f4f6fb;
  margin: 0;
  padding: 20px;
  text-align: center;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin: 15px auto;
  max-width: 500px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

button {
  padding: 12px 18px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  margin: 5px;
}

.blue { background: #2f6fed; color: white; }
.red { background: #dc2626; color: white; }
.green { background: #16a34a; color: white; }

.hidden { display: none; }

.alert { padding: 10px; margin-top: 10px; border-radius: 10px; }
.safe { background: #dcfce7; }
.danger { background: #fee2e2; }

.chat { max-height: 200px; overflow-y: auto; text-align: left; }
.msg { margin: 5px 0; }
.user { text-align: right; }
</style>
</head>

<body>

<h1>SafeBite</h1>

<div id="login" class="card">
  <button class="blue" onclick="startApp()">Start App</button>
</div>

<div id="app" class="hidden">

  <div class="card">
    <h3>Select Allergens</h3>
    <label><input type="checkbox" value="peanuts"> Peanuts</label><br>
    <label><input type="checkbox" value="gluten"> Gluten</label><br>
    <label><input type="checkbox" value="dairy"> Dairy</label><br>
    <label><input type="checkbox" value="soy"> Soy</label><br>
    <label><input type="checkbox" value="eggs"> Eggs</label><br>
  </div>

  <div class="card">
    <h3>Scanner</h3>
    <div id="reader"></div>
    <button class="blue" onclick="startScanner()">Start Scan</button>
    <button onclick="reset()">Reset</button>

    <p id="product"></p>
    <p id="ingredients"></p>

    <div id="alert"></div>

    <div id="emergency" class="hidden">
      <button class="red" onclick="call911()">Call 911</button>
      <button class="blue" onclick="hospital()">Hospital</button>
    </div>
  </div>

  <div class="card">
    <h3>Chat</h3>
    <div id="chat" class="chat"></div>
    <input id="input" placeholder="Ask..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode"></script>

<script>
let scanner;
let allergens = [];

function startApp(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

document.querySelectorAll("input[type=checkbox]").forEach(cb=>{
  cb.addEventListener("change", ()=>{
    allergens = Array.from(document.querySelectorAll("input:checked")).map(e=>e.value);
  });
});

async function startScanner(){
  scanner = new Html5Qrcode("reader");
  const cams = await Html5Qrcode.getCameras();
  const cam = cams[0].id;

  scanner.start(cam,{fps:10,qrbox:250}, async (code)=>{
    stopScanner();

    const res = await fetch("https://world.openfoodfacts.org/api/v0/product/"+code+".json");
    const data = await res.json();

    const name = data.product.product_name || "Unknown Product";
    const ing = (data.product.ingredients_text || "").toLowerCase();

    document.getElementById("product").innerText = "Product: " + name;
    document.getElementById("ingredients").innerText = "Ingredients: " + ing;

    let found = allergens.filter(a=>ing.includes(a));

    const alertBox = document.getElementById("alert");
    const emergency = document.getElementById("emergency");

    if(found.length){
      alertBox.className = "alert danger";
      alertBox.innerText = "⚠️ Contains: " + found.join(", ");
      emergency.classList.remove("hidden");
    } else {
      alertBox.className = "alert safe";
      alertBox.innerText = "✅ Safe to eat";
      emergency.classList.add("hidden");
    }
  });
}

async function stopScanner(){
  if(scanner){
    await scanner.stop();
    await scanner.clear();
  }
}

function reset(){
  document.getElementById("product").innerText = "";
  document.getElementById("ingredients").innerText = "";
  document.getElementById("alert").innerText = "";
}

function call911(){
  window.location.href = "tel:911";
}

function hospital(){
  window.open("https://maps.apple.com/?q=hospital");
}

function send(){
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const text = input.value;
  if(!text) return;

  chat.innerHTML += `<div class="msg user">${text}</div>`;

  let reply = "I can help with allergens, scanning, or emergencies.";

  if(text.includes("scan")) reply = "Press Start Scan.";
  if(text.includes("allergy")) reply = "Select allergens first.";
  if(text.includes("911")) reply = "Use emergency button.";

  chat.innerHTML += `<div class="msg">${reply}</div>`;
  input.value = "";
}
</script>

</body>
</html>
